# SonarQube Cloud project configuration for HoneyDrunk.Web.Rest.
# Project imported via the SonarQube Cloud GitHub App; quality gate runs in
# job-sonarcloud.yml (HoneyDrunk.Actions) on every pull request to main.
# Post-merge analysis on `push` to `main` is deferred (cost discipline per
# ADR-0011 D11 + D6); the upstream job-sonarcloud.yml supports both event
# types if push-time analysis is ever wanted.
#
# This file lives at HoneyDrunk.Web.Rest/sonar-project.properties (inside the
# inner project subdir, next to HoneyDrunk.Web.Rest.slnx). All sonar.sources /
# sonar.tests paths are relative to this subdir, which matches the
# working-directory the reusable job-sonarcloud.yml runs from.

sonar.organization=honeydrunkstudios
sonar.projectKey=honeydrunkstudios_HoneyDrunk.Web.Rest
sonar.projectName=HoneyDrunk.Web.Rest

# Sources — Abstractions + AspNetCore integration (Web.Rest bundles Abstractions
# and AspNetCore directly without a separate runtime project)
sonar.sources=HoneyDrunk.Web.Rest.Abstractions,HoneyDrunk.Web.Rest.AspNetCore

# Tests — main test project plus the Canary cross-Node verification project
sonar.tests=HoneyDrunk.Web.Rest.Tests,HoneyDrunk.Web.Rest.Canary

# Coverage (consumed by job-sonarcloud.yml after Cobertura → OpenCover conversion)
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# Exclusions — generated code and build outputs
sonar.exclusions=**/obj/**,**/bin/**,**/*.Designer.cs

# No coverage exclusions — Web.Rest.Abstractions contains concrete types and
# helpers, not interface-only stubs. Let Sonar measure them. Use
# [ExcludeFromCodeCoverage] attributes for surgical exclusions if needed.

