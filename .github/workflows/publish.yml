name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, e.g., 0.1.0)'
        required: true
        type: string

permissions: {}

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_tag: ${{ steps.get_version.outputs.version_tag }}
    steps:
      - name: Determine version
        id: get_version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION_TAG="v${VERSION}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version must be SemVer-like (for example 1.2.3 or 1.2.3-preview.1): $VERSION"
            exit 1
          fi
          printf 'version=%s\n' "$VERSION" >>"$GITHUB_OUTPUT"
          printf 'version_tag=%s\n' "$VERSION_TAG" >>"$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"
          echo "Publishing tag: $VERSION_TAG"

  release:
    name: Build, Pack & Publish
    needs: prepare
    permissions:
      contents: write
      packages: write
      id-token: write
      security-events: write
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/release.yml@main
    with:
      dotnet-version: '10.0.x'
      configuration: 'Release'
      runs-on: 'ubuntu-latest'
      project-path: 'HoneyDrunk.Web.Rest/HoneyDrunk.Web.Rest.slnx'
      enable-nuget-publish: true
      nuget-source: 'https://api.nuget.org/v3/index.json'
      package-version: ${{ needs.prepare.outputs.version }}
      create-github-release: true
      github-release-tag: ${{ needs.prepare.outputs.version_tag }}
      release-product-name: HoneyDrunk.Web.Rest
      release-product-description: 'Standardized REST API conventions for HoneyDrunk.OS -- unified response envelopes, correlation propagation, exception mapping, and API contracts.'
      release-nuget-packages: |
        HoneyDrunk.Web.Rest.Abstractions
        HoneyDrunk.Web.Rest.AspNetCore
      release-docs-url: 'https://github.com/HoneyDrunkStudios/HoneyDrunk.Web.Rest#readme'
      actions-ref: 'main'
    secrets:
      nuget-api-key: ${{ secrets.NUGET_API_KEY }}
